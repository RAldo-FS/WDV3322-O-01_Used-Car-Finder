<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Used Car Finder</title>
    <link rel="stylesheet" href="CSS/stylesheet.css">
</head>
<body>
    <section id="heroContainer">
        <h1>Car Finder</h1>
        <h2>Looking for your dream vehicle? Use the form below to find the car of your dreams.</h2>
    </section>
    <form id="search">
        <section class="searchColumn">
            <h3>Year</h3>
            <fieldset>
                <legend>Year</legend>
                <select id="year" required><option value="" selected disabled hidden>Vehicle Year</option></select>
            </fieldset>
        </section>
        <section class="searchColumn">
            <h3>Make</h3>
            <fieldset>
                <legend>Make</legend>
                <select id="make" required><option value="" selected disabled hidden>Vehicle Make</option></select>
            </fieldset>
        </section>
        <section class="searchColumn">
            <h3>Model</h3>
            <fieldset>
                <legend>Model</legend>
                <select id="model" required><option value="" selected disabled hidden>Vehicle Model</option></select>
            </fieldset>
        </section>
    </form>

    <script src="JS/script.js"></script>
</body>
</html>
